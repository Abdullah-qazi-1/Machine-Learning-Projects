<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPredict</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Mulish:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f7f5f0;
            --white: #ffffff;
            --dark: #1c1c1e;
            --mid: #4a4a5a;
            --muted: #9a9aaa;
            --accent: #3d6b8e;
            --border: #e4e2dc;
        }
        body {
            background: var(--bg);
            color: var(--dark);
            font-family: 'Mulish', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }
        .container {
            max-width: 540px;
            width: 100%;
            text-align: center;
            animation: rise 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes rise {
            from { opacity: 0; transform: translateY(28px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon-wrap {
            width: 68px; height: 68px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 28px;
            font-size: 30px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5.5vw, 2.9rem);
            font-weight: 700;
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin-bottom: 14px;
        }
        h1 em { font-style: italic; color: var(--accent); }
        .desc {
            font-size: 15px;
            color: var(--mid);
            line-height: 1.75;
            font-weight: 300;
            margin-bottom: 36px;
        }
        .pills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 36px;
        }
        .pill {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 7px 16px;
            font-size: 12.5px;
            font-weight: 500;
            color: var(--mid);
            display: flex; align-items: center; gap: 6px;
        }
        .pill span {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--dark);
            color: #fff;
            text-decoration: none;
            font-size: 14.5px;
            font-weight: 600;
            padding: 14px 34px;
            border-radius: 12px;
            transition: all 0.25s ease;
        }
        .btn:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(61,107,142,0.28);
        }
        .btn svg { transition: transform 0.25s; }
        .btn:hover svg { transform: translateX(4px); }
        .rule { width: 36px; height: 1px; background: var(--border); margin: 36px auto; }
        .footnote { font-size: 12px; color: var(--muted); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrap">🎓</div>
        <h1>Student <em>Exam</em><br>Performance Predictor</h1>
        <p class="desc">Enter a student's background details and subject scores — our trained ML model instantly predicts their expected math performance.</p>
        <div class="pills">
            <div class="pill"><span></span> 7 Models Evaluated</div>
            <div class="pill"><span></span> ~88% R² Accuracy</div>
            <div class="pill"><span></span> Instant Prediction</div>
        </div>
        <a href="/predictdata" class="btn">
            Start Prediction
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                <path d="M2.5 7.5h10M8.5 3.5l4 4-4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
        <div class="rule"></div>
        <p class="footnote">Flask · Scikit-Learn · XGBoost · CatBoost</p>
    </div>
</body>
</html>
